name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@49fe813f1881ed0a07b80143c488162d35b2c9b4 # v20260518.2
        with:
          prefix: 'v0.'
          tag: 'true'
