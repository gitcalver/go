name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@67dafd228924792025243c68997f713e3a9340ab # v20260430.1
        with:
          prefix: 'v0.'
          tag: 'true'
