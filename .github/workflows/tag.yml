name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@38c78947c541bac320f94d4de6b8a2fa9ad79c18 # v20260613.1
        with:
          prefix: 'v0.'
          tag: 'true'
