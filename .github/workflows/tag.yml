name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@0227b742d5c2f598bbeebd6609130f0a31eb4c62 # v20260417.3
        with:
          prefix: 'v0.'
          tag: 'true'
