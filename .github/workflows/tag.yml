name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@ba3cb35cd5ee02b58706c6191c44f8d197315069 # v20260414.6
        with:
          prefix: 'v0.'
          tag: 'true'
