name: Tag
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: gitcalver/sh@3d654bc557028b24d03756340346702dd52f5a25 # v20260530.6
        with:
          prefix: 'v0.'
          tag: 'true'
